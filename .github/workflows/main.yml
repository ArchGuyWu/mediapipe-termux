name: Build MediaPipe Android AArch64 Python Wheels

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      git_ref:
        description: 'Google MediaPipe official repository tag/branch/commit to build (e.g., master, v0.10.14)'
        required: true
        default: 'master'
        type: string
      python_versions:
        description: 'Python version(s) to build (e.g., 3.10,3.11,3.12,3.13,3.14)'
        required: true
        default: '3.13,3.14'
        type: string
      publish_to_pypi:
        description: 'Publish wheels to PyPI'
        required: true
        default: false
        type: boolean

jobs:
  setup:
    name: Setup Build Matrix & Ref
    runs-on: ubuntu-latest
    outputs:
      python-matrix: ${{ steps.set-matrix.outputs.python-matrix }}
      git-ref: ${{ steps.set-ref.outputs.git-ref }}
    steps:
      - id: set-matrix
        run: |
          # Default python versions for automatic triggers
          INPUT_VERSIONS="3.13,3.14"

          # Override if manually triggered
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ github.event.inputs.python_versions }}" ]; then
              INPUT_VERSIONS="${{ github.event.inputs.python_versions }}"
            fi
          fi

          # Convert comma-separated string to JSON array dynamically using jq
          JSON_ARRAY=$(echo "$INPUT_VERSIONS" | jq -c -R 'split(",")')
          echo "python-matrix=${JSON_ARRAY}" >> $GITHUB_OUTPUT

      - id: set-ref
        run: |
          GIT_REF="master"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ github.event.inputs.git_ref }}" ]; then
              GIT_REF="${{ github.event.inputs.git_ref }}"
            fi
          fi
          echo "git-ref=${GIT_REF}" >> $GITHUB_OUTPUT

  build-mediapipe-wheels:
    name: "Build MediaPipe Android Wheel - Py ${{ matrix.python-version }}"
    needs: setup
    runs-on: ubuntu-latest
    env:
      PUBLISH_TO_PYPI: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_to_pypi == 'true') && 'true' || 'false' }}

    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(needs.setup.outputs.python-version-matrix || needs.setup.outputs.python-matrix) }}

    steps:
      # Step 1: Checkout the official Google MediaPipe repository
      - name: Checkout Google MediaPipe Repository
        uses: actions/checkout@v4
        with:
          repository: 'google/mediapipe'
          ref: ${{ needs.setup.outputs.git-ref }}
          lfs: true
          submodules: recursive

      # Step 2: Setup Java JDK (Bazel requires Java to run)
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 3: Setup Android NDK (r25c or similar is standard for MediaPipe stable versions)
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c
          add-to-path: false

      # Step 4: Setup Bazel using setup-bazel action (which respects .bazelversion)
      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          disk-cache: true
          repository-cache: true

      # Step 5: Install uv package manager
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # Step 6: Setup Python matching the matrix version
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Step 7: Install Python packages required for building wheels
      - name: Install Build Dependencies
        run: |
          uv pip install --system wheel setuptools numpy protobuf

      # Step 8: Patch setup.py to support Android cross-compilation
      - name: Patch MediaPipe setup.py for Android Wheels
        env:
          GIT_REF: ${{ needs.setup.outputs.git-ref }}
        run: |
          python3 -c "
          import re, os

          with open('setup.py', 'r') as f:
              code = f.read()

          # Replace default bazel build flags in setup.py to cross-compile for Android arm64
          # Specifically targeting: --config=android_arm64
          pattern = r\"'bazel',\s*'build',\s*'--compilation_mode=opt'\"
          replacement = \"'bazel', 'build', '--compilation_mode=opt', '--config=android_arm64'\"

          patched = re.sub(pattern, replacement, code)

          # Force MP_DISABLE_GPU to be False so GPU is enabled at import-time
          patched = patched.replace(
              \"MP_DISABLE_GPU = os.environ.get('MEDIAPIPE_DISABLE_GPU') != '0'\",
              \"MP_DISABLE_GPU = False\"
          )

          # Resolve PEP 440 InvalidVersion: 'dev' error using the dynamic git_ref
          git_ref = os.environ.get('GIT_REF', 'master')
          version = git_ref.lstrip('v')
          if not any(char.isdigit() for char in version):
              version = '0.0.0.dev0'

          patched = patched.replace(\"__version__ = 'dev'\", f\"__version__ = '{version}'\")

          with open('setup.py', 'w') as f:
              f.write(patched)

          print(f'Successfully patched setup.py for Android arm64 cross-compilation and resolved versioning issue with version: {version}')
          "

      # Step 8.5: Patch mediapipe/python/BUILD to link against OpenCV on Android
      - name: Patch MediaPipe Python BUILD for Android OpenCV
        run: |
          python3 -c "
          with open('mediapipe/python/BUILD', 'r') as f:
              content = f.read()

          # Add //third_party:opencv to deps of _framework_bindings pybind_extension
          old_deps = '    deps = [\n        \":builtin_calculators\",'
          new_deps = '    deps = [\n        \"//third_party:opencv\",\n        \":builtin_calculators\",'
          content = content.replace(old_deps, new_deps)

          # Modify linkopts select to exclude desktop opencv libs on Android arm64/arm/x86/x86_64
          old_linkopts = '    linkopts = select({\n        \"//third_party:opencv_source_build\": [],\n        \"//conditions:default\": ['
          new_linkopts = '''    linkopts = select({
              \"//third_party:opencv_source_build\": [],
              \"//mediapipe:android_arm64\": [],
              \"//mediapipe:android_arm\": [],
              \"//mediapipe:android_x86\": [],
              \"//mediapipe:android_x86_64\": [],
              \"//conditions:default\": ['''
          content = content.replace(old_linkopts, new_linkopts)

          with open('mediapipe/python/BUILD', 'w') as f:
              f.write(content)
          print('Successfully patched mediapipe/python/BUILD for Android OpenCV linkage.')
          "

      # Step 8.6: Patch MediaPipe to bypass GenAI/odml dependency
      - name: Patch MediaPipe to bypass GenAI/odml dependency
        run: |
          python3 -c "
          import os, shutil

          # Remove tasks/c/genai directory if it exists to prevent package analysis errors
          if os.path.exists('mediapipe/tasks/c/genai'):
              shutil.rmtree('mediapipe/tasks/c/genai')
              print('Successfully removed mediapipe/tasks/c/genai directory.')

          # Remove GenAI dependencies from mediapipe/tasks/c/BUILD to avoid missing package errors
          if os.path.exists('mediapipe/tasks/c/BUILD'):
              with open('mediapipe/tasks/c/BUILD', 'r') as f:
                  lines = f.readlines()
              new_lines = [line for line in lines if 'genai' not in line.lower()]
              with open('mediapipe/tasks/c/BUILD', 'w') as f:
                  f.writelines(new_lines)
              print('Successfully patched mediapipe/tasks/c/BUILD to remove GenAI dependencies.')

          # Remove model_ckpt_util from Python package dependencies
          if os.path.exists('mediapipe/python/BUILD'):
              with open('mediapipe/python/BUILD', 'r') as f:
                  content = f.read()
              content = content.replace('\"//mediapipe/python/pybind:model_ckpt_util\",', '# \"//mediapipe/python/pybind:model_ckpt_util\",')
              with open('mediapipe/python/BUILD', 'w') as f:
                  f.write(content)
              print('Successfully patched mediapipe/python/BUILD to remove model_ckpt_util.')

          # Comment out model_ckpt_util inclusion in framework_bindings.cc
          if os.path.exists('mediapipe/python/framework_bindings.cc'):
              with open('mediapipe/python/framework_bindings.cc', 'r') as f:
                  content = f.read()
              content = content.replace('#include \"mediapipe/python/pybind/model_ckpt_util.h\"', '// #include \"mediapipe/python/pybind/model_ckpt_util.h\"')
              content = content.replace('ModelCkptUtilModule(&m);', '// ModelCkptUtilModule(&m);')
              with open('mediapipe/python/framework_bindings.cc', 'w') as f:
                  f.write(content)
              print('Successfully patched mediapipe/python/framework_bindings.cc.')

          # Comment out model_ckpt_util import in __init__.py
          if os.path.exists('mediapipe/python/__init__.py'):
              with open('mediapipe/python/__init__.py', 'r') as f:
                  content = f.read()
              content = content.replace('from mediapipe.python._framework_bindings import model_ckpt_util', '# from mediapipe.python._framework_bindings import model_ckpt_util')
              with open('mediapipe/python/__init__.py', 'w') as f:
                  f.write(content)
              print('Successfully patched mediapipe/python/__init__.py.')
          "

      # Step 8.7: Patch WORKSPACE to support Python 3.13 and 3.14
      - name: Patch WORKSPACE for Python 3.13 and 3.14
        run: |
          python3 -c "
          import re, shutil, os

          # Copy the lock files in the root package to separate filenames
          shutil.copyfile('requirements_lock_3_12.txt', 'requirements_lock_3_13.txt')
          shutil.copyfile('requirements_lock_3_12.txt', 'requirements_lock_3_14.txt')
          print('Successfully copied requirements lock files for Python 3.13 and 3.14 at root.')

          # Also check and copy in third_party if present
          if os.path.exists('third_party/requirements_lock_3_12.txt'):
              shutil.copyfile('third_party/requirements_lock_3_12.txt', 'third_party/requirements_lock_3_13.txt')
              shutil.copyfile('third_party/requirements_lock_3_12.txt', 'third_party/requirements_lock_3_14.txt')
              print('Successfully copied requirements lock files for Python 3.13 and 3.14 in third_party.')

          # Patch third_party/BUILD if it exists to export the new files
          if os.path.exists('third_party/BUILD'):
              with open('third_party/BUILD', 'r') as f:
                  tp_content = f.read()
              tp_pattern = r'(\"requirements_lock_3_12\.txt\",?)'
              tp_replacement = r'\1\n    \"requirements_lock_3_13.txt\",\n    \"requirements_lock_3_14.txt\",'
              tp_content, tp_count = re.subn(tp_pattern, tp_replacement, tp_content)
              if tp_count > 0:
                  with open('third_party/BUILD', 'w') as f:
                      f.write(tp_content)
                  print('Successfully patched third_party/BUILD exports.')

          with open('WORKSPACE', 'r') as f:
              content = f.read()

          # Map 3.13 and 3.14 to their respective distinct lock files
          pattern = r'(\"3\.12\":\s*\"//:requirements_lock_3_12\.txt\",?)'
          replacement = r'\1\n        \"3.13\": \"//:requirements_lock_3_13.txt\",\n        \"3.14\": \"//:requirements_lock_3_14.txt\",'

          content, count = re.subn(pattern, replacement, content)
          if count > 0:
              print(f'Successfully patched WORKSPACE requirements for Python 3.13 and 3.14 ({count} occurrences).')
          else:
              print('Warning: Requirements lock pattern not found in WORKSPACE!')

          with open('WORKSPACE', 'w') as f:
              f.write(content)
          "

      # Step 9: Configure WORKSPACE to link against Android NDK and SDK
      - name: Configure Android SDK and NDK in WORKSPACE
        run: |
          # Append android_ndk_repository and android_sdk_repository if they are not active in WORKSPACE
          # This tells Bazel where to find the compilers and target headers
          cat << 'EOF' >> WORKSPACE

          # Android configuration injected by GHA builder
          android_ndk_repository(
              name = "androidndk",
              path = "${{ steps.setup-ndk.outputs.ndk-path }}",
              api_level = 24,
          )

          android_sdk_repository(
              name = "androidsdk",
              api_level = 34,
              build_tools_version = "34.0.0",
          )
          EOF

      # Step 9.5: Configure .bazelrc for Android GPU and Vulkan
      - name: Configure .bazelrc for Android GPU and Vulkan
        run: |
          cat << 'EOF' >> .bazelrc

          # Custom Android target-specific configuration injected by GHA builder
          build:android_arm64 --copt=-D__ANDROID_API__=24
          build:android_arm64 --linkopt=-lEGL
          build:android_arm64 --linkopt=-lGLESv2
          build:android_arm64 --linkopt=-lGLESv3
          build:android_arm64 --linkopt=-lvulkan
          EOF

      # Step 10: Run setup.py bdist_wheel with custom android platform tag
      - name: Build MediaPipe Android Wheel
        run: |
          # Build the wheel targeting android_24_arm64_v8a platform
          python3 setup.py bdist_wheel --plat-name=android_24_arm64_v8a
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          MEDIAPIPE_DISABLE_GPU: '0'

      # Step 11: Collect and upload the built wheel
      - name: Upload MediaPipe Android Wheel as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mediapipe-wheel-android-aarch64-py${{ matrix.python-version }}
          path: dist/*.whl

      # Step 12: Optional PyPI Publish
      - name: Publish to PyPI
        if: env.PUBLISH_TO_PYPI == 'true' && github.event_name == 'workflow_dispatch'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_UPLOAD_TOKEN }}
        run: |
          find dist -name "*.whl" -exec uv publish {} \;
